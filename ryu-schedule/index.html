<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Ryū · restricted</title>
<style>
  :root{
    --bg:#0e1a18; --card:#121e1b; --border:#1e3530; --text:#d8f0ea;
    --muted:#6a9a8a; --dim:#3a6058; --crimson:#e8365d; --teal:#00ffe0; --amber:#f0a500;
    --serif:"Noto Serif JP","Hiragino Mincho ProN","Yu Mincho",serif;
    --sans:"DM Sans","Segoe UI",system-ui,-apple-system,sans-serif;
    --mono:ui-monospace,"SF Mono","Cascadia Code",Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);
    display:grid;place-items:center;
    background-image:radial-gradient(900px 500px at 50% -10%,rgba(240,165,0,.08),transparent 60%);}
  .gate{width:min(92vw,360px);text-align:center;padding:8px}
  .gate .kanji{font-family:var(--serif);font-size:70px;color:var(--amber);opacity:.9;line-height:1}
  .gate .brand{font-family:var(--mono);font-size:10.5px;letter-spacing:.34em;text-transform:uppercase;color:var(--dim);margin-top:14px}
  .gate h1{font-family:var(--serif);font-weight:500;font-size:22px;margin:10px 0 4px;color:#eef7f3}
  .gate p{color:var(--muted);font-size:13px;margin:0 0 22px}
  form{display:flex;flex-direction:column;gap:10px}
  input{font-family:var(--mono);font-size:14px;text-align:center;letter-spacing:.06em;
    padding:12px 14px;color:var(--text);background:var(--card);
    border:1px solid var(--border);border-radius:8px;outline:none;transition:border-color .15s}
  input:focus{border-color:var(--amber)}
  button{font-family:var(--sans);font-weight:600;font-size:13.5px;letter-spacing:.02em;
    padding:11px 14px;color:var(--bg);background:var(--amber);border:0;border-radius:8px;cursor:pointer}
  button:disabled{opacity:.5;cursor:default}
  .err{min-height:16px;font-family:var(--mono);font-size:11.5px;color:var(--crimson);letter-spacing:.02em}
</style>
</head>
<body>
  <main class="gate">
    <div class="kanji">龍</div>
    <div class="brand">影組 · Shadow Crew</div>
    <h1>Enter the fold</h1>
    <p>Ryū's cadence is sealed. Enter the passphrase to open it.</p>
    <form id="f">
      <input id="pw" type="password" autocomplete="current-password" placeholder="passphrase" autofocus>
      <button id="go" type="submit">Unseal</button>
      <div class="err" id="err" role="alert"></div>
    </form>
  </main>

const b64=s=>{const b=atob(s),a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a;};
async function unseal(pw){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(SALT),iterations:ITER,hash:'SHA-256'},
    km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},key,b64(CT));
  return new TextDecoder().decode(pt);
}
const f=document.getElementById('f'),err=document.getElementById('err'),go=document.getElementById('go');
f.addEventListener('submit',async e=>{
  e.preventDefault();err.textContent='';go.disabled=true;
  try{
    const html=await unseal(document.getElementById('pw').value);
    document.open();document.write(html);document.close();
  }catch(_){ err.textContent='Wrong passphrase.';go.disabled=false;
    const p=document.getElementById('pw');p.value='';p.focus(); }
});
